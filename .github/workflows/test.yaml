name: Testing

on:
  workflow_call:
    inputs:
      go_version:
        type: string
        default: "1.22"
      provider:
        type: string
        default: "github"
    outputs:
      version:
        description: "Released version (empty if none)"
        value: ${{ jobs.release.outputs.version }}
    secrets:
      token:
        required: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev
