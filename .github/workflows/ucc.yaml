name: Splunk UCC - Build & Validate

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      artifact_addon_name:
        type: string
        default: "ucc-addon"
      artifact_report_name:
        type: string
        default: "splunk-validation-report"

jobs:
  build_validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UCC Framework
        run: |
          python -m pip install --upgrade pip
          python -m pip install "splunk-add-on-ucc-framework[validate]"

      - name: Build add-on (stamp version)
        run: |
          mkdir -p dist
          ucc-gen build --ta-version "${{ inputs.version }}" -o dist

      - name: Validate (AppInspect via UCC)
        run: |
          ucc-gen validate --addon-path dist | tee appinspect.txt

      - name: Upload built add-on
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_addon_name }}
          path: dist

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_report_name }}
          path: appinspect.txt
