name: PR Preview (draft release)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write   # needed to create/update releases
  pull-requests: read

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semver:
    uses: ./.github/workflows/semver.yaml
    with:
      mode: pr
      pr_number: ${{ github.event.pull_request.number }}
      sha: ${{ github.sha }}

  build:
    needs: semver
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ needs.semver.outputs.version }}
      artifact_addon_name: ${{ vars.ADDON_NAME }}
      artifact_report_name: ${{ vars.REPORT_NAME }}

