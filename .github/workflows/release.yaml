name: Release

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true

      # main => run semantic-release
      # pr   => draft prerelease with stable tag
      mode:
        type: string
        default: "main"

      # PR mode: stable tag, e.g. "pr-123"
      tag:
        type: string
        required: false

      release_name:
        type: string
        required: false

      target_commitish:
        type: string
        required: false

      draft:
        type: boolean
        default: false

      prerelease:
        type: boolean
        default: false

      go_version:
        type: string
        default: "1.22"

      provider:
        type: string
        default: "github"

      artifact_name:
        type: string
        default: "release-assets"

    outputs:
      release_url:
        description: "HTML URL of the created/updated release"
        value: ${{ jobs.release.outputs.release_url }}
      release_tag:
        description: "Tag used for the release"
        value: ${{ jobs.release.outputs.release_tag }}

    secrets:
      token:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.out.outputs.release_url }}
      release_tag: ${{ steps.out.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: release-assets

      # ----------------------------
      # MAIN MODE: semantic-release
      # ----------------------------
      - name: Set up Go
        if: ${{ inputs.mode == 'main' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install go-semantic-release
        if: ${{ inputs.mode == 'main' }}
        run: |
          set -euo pipefail
          go install github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@latest
          echo "${HOME}/go/bin" >> $GITHUB_PATH

      - name: Configure Git user
        if: ${{ inputs.mode == 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release (creates tag + GitHub release)
        if: ${{ inputs.mode == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          semantic-release --provider "${{ inputs.provider }}"

      - name: Upload release assets (main)
        if: ${{ inputs.mode == 'main' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          echo "Uploading assets to ${TAG}"

          EXTRA=""
          if [[ -f "release-assets/appinspect.txt" ]]; then
            EXTRA="release-assets/appinspect.txt"
          fi

          gh release upload "${TAG}" release-assets/output/* $EXTRA --clobber

          URL="$(gh release view "${TAG}" --json url -q .url)"
          echo "Release URL: $URL"
          echo "release_url=$URL" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # PR MODE: clean replace draft
      # ----------------------------
      - name: Replace PR draft release (delete old, create new)
        if: ${{ inputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          if [[ -z "${TAG:-}" ]]; then
            echo "mode=pr requires inputs.tag (recommended: pr-<number>)" >&2
            exit 1
          fi

          NAME="${{ inputs.release_name }}"
          if [[ -z "${NAME:-}" ]]; then
            NAME="PR Preview – ${{ inputs.version }}"
          fi

          TARGET="${{ inputs.target_commitish }}"
          if [[ -z "${TARGET:-}" ]]; then
            TARGET="${GITHUB_SHA}"
          fi

          echo "Ensuring a clean PR draft release for tag: ${TAG}"

          # If a release exists for this tag, delete it (this also removes its assets)
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Deleting existing release ${TAG}"
            gh release delete "${TAG}" -y
          fi

          # Also delete the git tag if it exists (so we recreate from scratch cleanly)
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Deleting remote tag ${TAG}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null
          fi

          echo "Creating new draft prerelease ${TAG} at ${TARGET}"
          gh release create "${TAG}" \
            --title "${NAME}" \
            --target "${TARGET}" \
            --draft=${{ inputs.draft }} \
            --prerelease=${{ inputs.prerelease }} \
            --notes "Automated PR preview release for ${TAG} (${TARGET})."

      - name: Upload release assets (pr)
        if: ${{ inputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          echo "Uploading assets to ${TAG}"

          EXTRA=""
          if [[ -f "release-assets/appinspect.txt" ]]; then
            EXTRA="release-assets/appinspect.txt"
          fi

          gh release upload "${TAG}" release-assets/output/* $EXTRA --clobber

          URL="$(gh release view "${TAG}" --json url -q .url)"
          echo "Release URL: $URL"
          echo "release_url=$URL" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Expose outputs
        id: out
        run: |
          # This step exists only so job outputs are always set via $GITHUB_OUTPUT in the upload steps.
          # Nothing to do here.
          true
