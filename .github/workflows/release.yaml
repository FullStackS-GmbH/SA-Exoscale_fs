name: Release

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true

      # main => run semantic-release
      # pr   => draft prerelease (no semantic-release)
      mode:
        type: string
        default: "main"

      # PR mode: stable tag so updates overwrite the same draft release
      # e.g. "pr-123"
      tag:
        type: string
        required: false

      # Optional display name for the GitHub release
      release_name:
        type: string
        required: false

      # Optional: set release target commit
      target_commitish:
        type: string
        required: false

      # PR mode defaults
      draft:
        type: boolean
        default: false
      prerelease:
        type: boolean
        default: false

      go_version:
        type: string
        default: "1.22"
      provider:
        type: string
        default: "github"

      # Artifact name produced by build workflow
      artifact_name:
        type: string
        default: "release-assets"

    secrets:
      token:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: release-assets

      # ----------------------------
      # MAIN MODE: real release flow
      # ----------------------------
      - name: Set up Go
        if: ${{ inputs.mode == 'main' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install go-semantic-release
        if: ${{ inputs.mode == 'main' }}
        run: |
          set -euo pipefail
          go install github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@latest
          echo "${HOME}/go/bin" >> $GITHUB_PATH

      - name: Configure Git user
        if: ${{ inputs.mode == 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release (creates tag + GitHub release)
        if: ${{ inputs.mode == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          semantic-release --provider "${{ inputs.provider }}"

      # ----------------------------
      # PR MODE: draft prerelease flow
      # ----------------------------
      - name: Create/Update draft prerelease (PR mode)
        if: ${{ inputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          if [[ -z "${TAG:-}" ]]; then
            echo "mode=pr requires inputs.tag (recommended: pr-<number>)" >&2
            exit 1
          fi

          NAME="${{ inputs.release_name }}"
          if [[ -z "${NAME:-}" ]]; then
            NAME="PR Preview – ${{ inputs.version }}"
          fi

          TARGET="${{ inputs.target_commitish }}"
          if [[ -z "${TARGET:-}" ]]; then
            TARGET="${GITHUB_SHA}"
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${NAME}" \
              --target "${TARGET}" \
              --draft=${{ inputs.draft }} \
              --prerelease=${{ inputs.prerelease }}
          else
            gh release create "${TAG}" \
              --title "${NAME}" \
              --target "${TARGET}" \
              --draft=${{ inputs.draft }} \
              --prerelease=${{ inputs.prerelease }} \
              --notes "Automated PR preview release for ${TAG} (${TARGET})."
          fi

      # ----------------------------
      # Upload assets (both modes)
      # ----------------------------
      - name: Upload release assets
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          ls -R release-assets || true

          if [[ "${{ inputs.mode }}" == "pr" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${{ inputs.version }}"
          fi

          echo "Uploading assets to ${TAG}"

          # Keep your existing structure
          # If appinspect.txt might not exist for some builds, guard it:
          EXTRA=""
          if [[ -f "release-assets/appinspect.txt" ]]; then
            EXTRA="release-assets/appinspect.txt"
          fi

          gh release upload "${TAG}" \
            release-assets/output/* \
            $EXTRA \
            --clobber
