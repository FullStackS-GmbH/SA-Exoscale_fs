name: Release

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true

      mode:
        type: string
        default: "main" # "main" or "pr"

      # PR mode stable tag, e.g. pr-123
      tag:
        type: string
        required: false

      release_name:
        type: string
        required: false

      target_commitish:
        type: string
        required: false

      draft:
        type: boolean
        default: false

      prerelease:
        type: boolean
        default: false

      go_version:
        type: string
        default: "1.22"

      provider:
        type: string
        default: "github"

      artifact_name:
        type: string
        default: "release-assets"

    secrets:
      token:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: release-assets

      # ----------------------------
      # PR MODE: delete old + create new with stable tag
      # ----------------------------
      - name: Create PR draft release (stable tag)
        if: ${{ inputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          if [[ -z "${TAG:-}" ]]; then
            echo "mode=pr requires inputs.tag (e.g. pr-<number>)" >&2
            exit 1
          fi

          NAME="${{ inputs.release_name }}"
          if [[ -z "${NAME:-}" ]]; then
            NAME="PR Preview – ${{ inputs.version }}"
          fi

          TARGET="${{ inputs.target_commitish }}"
          if [[ -z "${TARGET:-}" ]]; then
            TARGET="${GITHUB_SHA}"
          fi

          echo "Replacing PR release: ${TAG}"

          # Delete existing release for this tag (and its assets)
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release delete "${TAG}" -y
          fi

          # Delete remote git tag if it exists (optional, but keeps it clean)
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null
          fi

          # Build flags (NO --draft=true style!)
          FLAGS=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then FLAGS+=("--draft"); fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then FLAGS+=("--prerelease"); fi

          gh release create "${TAG}" \
            --title "${NAME}" \
            --target "${TARGET}" \
            --notes "Automated PR preview release for ${TAG} (${TARGET})." \
            "${FLAGS[@]}"

      - name: Upload release assets (pr)
        if: ${{ inputs.mode == 'pr' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"

          echo "Uploading assets to ${TAG}"
          ls -R release-assets || true

          EXTRA=()
          if [[ -f "release-assets/appinspect.txt" ]]; then
            EXTRA+=("release-assets/appinspect.txt")
          fi

          gh release upload "${TAG}" release-assets/output/* "${EXTRA[@]}" --clobber
          gh release view "${TAG}" --json url -q .url

      # ----------------------------
      # MAIN MODE: semantic-release
      # ----------------------------
      - name: Set up Go
        if: ${{ inputs.mode == 'main' }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install go-semantic-release
        if: ${{ inputs.mode == 'main' }}
        run: |
          set -euo pipefail
          go install github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@latest
          echo "${HOME}/go/bin" >> $GITHUB_PATH

      - name: Configure Git user
        if: ${{ inputs.mode == 'main' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release (creates tag + GitHub release)
        if: ${{ inputs.mode == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          semantic-release --provider "${{ inputs.provider }}"

      - name: Upload release assets (main)
        if: ${{ inputs.mode == 'main' }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          EXTRA=()
          if [[ -f "release-assets/appinspect.txt" ]]; then
            EXTRA+=("release-assets/appinspect.txt")
          fi
          gh release upload "${TAG}" release-assets/output/* "${EXTRA[@]}" --clobber
