name: CI/CD

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  semver:
    permissions:
      contents: read
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/semver.yaml@v1.5.3

  build:
    needs: semver
    permissions:
      contents: read
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/build.yaml@v1.5.3
    with:
      version: ${{ needs.semver.outputs.version }}
      artifact_report_name: appinspect.txt

  release:
    needs: [semver, build]
    permissions:
      actions: read
      contents: write
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/release.yaml@v1.5.3
    with:
      version: ${{ needs.semver.outputs.version }}

  publish:
    needs: [ semver, build, release ]
    permissions:
      actions: read
      contents: read
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/publish.yaml@v1.5.3
    with:
      VERSION: ${{ needs.semver.outputs.version }}
      environment: FS Splunk Prod
    secrets: inherit
