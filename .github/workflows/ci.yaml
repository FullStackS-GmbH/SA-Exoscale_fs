name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  semver:
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/semver.yaml@v1.4.0

  build:
    needs: semver
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/build.yaml@v1.4.0
    with:
      version: ${{ needs.semver.outputs.version }}
      artifact_report_name: appinspect.txt

  release:
    needs: [semver, build]
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/release.yaml@v1.4.0
    with:
      version: ${{ needs.semver.outputs.version }}

  publish:
    needs: [ semver, build ]
    uses: FullStackS-GmbH/splunk-workflows/.github/workflows/publish.yaml@v1.4.0
    with:
      VERSION: ${{ needs.semver.outputs.version }}
      SPLUNKBASE_USER: ${{ secrets.SPLUNKBASE_USER }}
      SPLUNKBASE_PASSWORD: ${{ secrets.SPLUNKBASE_PASSWORD }}
