name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  semver:
    uses: ./.github/workflows/sem_ver.yaml

  build:
    needs: semver
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ needs.semver.outputs.version }}
      artifact_addon_name: ${{ vars.ADDON_NAME }}
      artifact_report_name: ${{ vars.REPORT_NAME }}

  release:
    needs: [semver, build]
    uses: ./.github/workflows/release.yaml
