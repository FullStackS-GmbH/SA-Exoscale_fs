name: Link Draft Release in PR

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag used for the draft release"
        type: string
        required: true

      version:
        description: "Computed version string"
        type: string
        required: true

      pr_number:
        description: "Pull request number"
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
      - name: Post or update PR comment with release link
        uses: actions/github-script@v7
        env:
          TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(process.env.PR_NUMBER);
            const tag = process.env.TAG;
            const version = process.env.VERSION;

            const marker = '<!-- pr-preview-release-link -->';

            // Get release URL from tag
            const rel = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag
            });

            const releaseUrl = rel.data.html_url;

            const body =
              `${marker}
              🚧 **Draft Preview Release**

              Version: \`${version}\`
              Tag: \`${tag}\`

              Download & inspect artifacts:
              ${releaseUrl}
              `;

            // Look for existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' &&
              typeof c.body === 'string' &&
              c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
