name: Semantic Versioning

on:
  workflow_call:
    inputs:
      go_version:
        type: string
        default: "1.23"

      # "main" => compute the next real semver (must succeed)
      # "pr"   => compute a preview version for PR builds (always succeeds)
      mode:
        type: string
        default: "main"

      # used when mode == "pr"
      pr_number:
        type: string
        required: false
      sha:
        type: string
        required: false

    outputs:
      version:
        description: "Computed version string (required)"
        value: ${{ jobs.versioning.outputs.version }}
      base_version:
        description: "Base semver without PR/build suffix (best-effort in PR mode)"
        value: ${{ jobs.versioning.outputs.base_version }}
      is_prerelease:
        description: "true when mode=pr"
        value: ${{ jobs.versioning.outputs.is_prerelease }}

    secrets:
      token:
        required: false

permissions:
  contents: read

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.out.outputs.version }}
      base_version: ${{ steps.out.outputs.base_version }}
      is_prerelease: ${{ steps.out.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go_version }}

      - name: Install go-semantic-release
        run: |
          set -euo pipefail
          go install github.com/go-semantic-release/semantic-release/v2/cmd/semantic-release@latest
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      - name: Compute version
        id: out
        env:
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
        run: |
          set -euo pipefail

          MODE="${{ inputs.mode }}"

          # Try to compute "next" version using go-semantic-release in dry mode.
          # Example output contains: "new version: 1.2.3"
          NEXT_VERSION="$(semantic-release --dry 2>&1 | sed -nE 's/.*new version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | head -n 1 || true)"

          get_latest_tag_version() {
            # Prefer a clean semver tag like v1.2.3 or 1.2.3; return empty if none.
            git describe --tags --abbrev=0 2>/dev/null \
              | sed -nE 's/^v?([0-9]+\.[0-9]+\.[0-9]+)$/\1/p' \
              | head -n 1 || true
          }

          if [[ "$MODE" == "pr" ]]; then
            # In PR mode we always emit a preview version.
            BASE_VERSION="$NEXT_VERSION"
            if [[ -z "$BASE_VERSION" ]]; then
              BASE_VERSION="$(get_latest_tag_version)"
            fi
            if [[ -z "$BASE_VERSION" ]]; then
              BASE_VERSION="0.0.0"
            fi

            PR_NUMBER="${{ inputs.pr_number }}"
            if [[ -z "${PR_NUMBER:-}" ]]; then
              PR_NUMBER="${{ github.event.pull_request.number || '' }}"
            fi
            if [[ -z "${PR_NUMBER:-}" ]]; then
              echo "mode=pr requires pr_number (either pass it in or run from pull_request event)" >&2
              exit 1
            fi

            SHA_INPUT="${{ inputs.sha }}"
            if [[ -z "${SHA_INPUT:-}" ]]; then
              SHA_INPUT="${GITHUB_SHA}"
            fi
            SHORT_SHA="$(echo "$SHA_INPUT" | cut -c1-7)"

            VERSION="${BASE_VERSION}-pr.${PR_NUMBER}.sha-${SHORT_SHA}"

            echo "Computed PR preview version: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Main mode: keep strict behavior (must compute a next version)
          if [[ -z "$NEXT_VERSION" ]]; then
            echo "Could not determine next version from semantic-release --dry output" >&2
            exit 1
          fi

          echo "Computed main version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
