### CIM Normalization for Exoscale events
### Add-on built by FullstackS

[exoscale:event]
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT=%Y-%m-%dT%H:%M:%SZ
TIME_PREFIX=\"timestamp\"\:\s\"
TRUNCATE = 100000
TRANSFORMS-exoscale_route_sourcetype = exoscale_route_mutation, exoscale_route_auth

### Exoscale Authentication Events ###
[exoscale:audittrail:auth]
SHOULD_LINEMERGE = false
KV_MODE = json

TIME_FORMAT=%Y-%m-%dT%H:%M:%SZ
TIME_PREFIX=\"timestamp\"\:\s\"
MAX_TIMESTAMP_LOOKAHEAD = 25

FIELDALIAS-exo_src = source-ip AS src, source-ip AS src_ip

EVAL-user = replace(message, "^User\\s+([^:]+):.*$", "\\1")
EVAL-command = handler

EVAL-action = case(lower(handler)="revoke session", "logout", true(), "login")

EVAL-result = case(status>=200 AND status<400, "success", true(), "failure")


### Exoscale Mutations Events ###
[exoscale:audittrail:mutation]
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT=%Y-%m-%dT%H:%M:%SZ
TIME_PREFIX=\"timestamp\"\:\s\"
MAX_TIMESTAMP_LOOKAHEAD = 25

FIELDALIAS-exo_src = source-ip AS src, source-ip AS src_ip
FIELDALIAS-exo_obj = uri AS object
FIELDALIAS-exo_cmd = handler AS command

EVAL-change_id = coalesce('request-id', change_id)

EVAL-user_role = coalesce('iam-role.name', user_role)
EVAL-user = coalesce('iam-user.id', 'iam-api-key.name', user, case(handler=="verify-phone-number" OR handler=="enable-two-factor-auth" OR handler=="accept" OR handler="regenerate-two-factor-auth" OR handler=="destroy", replace(message, "(?:.*\suser\s+([^\s]+)\s.*)|(?:User\s)?([^\s\:]+)(?:\s|\:).*", "\1\2"), true(), "N/A"))
EVAL-user_id = coalesce('iam-user.id', 'iam-api-key.name', user_id)

EVAL-result = case(status>=200 AND status<400, "success", true(), "failure")

# Action mapping
EVAL-action = case(match(lower(command), "^(create-|register-|add-|attach-|accept$)"), "created",    \
  match(lower(command), "^(update-|enable-|upgrade-|scale-)"), "modified",       \
  match(lower(command), "^(delete-|detach-)"), "deleted",           \
  lower(command)="start-instance", "started",                        \
  lower(command)="stop-instance", "stopped",                         \
  lower(command)="generate-sks-cluster-kubeconfig", "read",          \
  lower(command)="reveal-instance-password", "read", true(), "modified")

# Object Category
EVAL-object_category = case(        \
  like(object, "/v2/security-group/%/rules%") OR match(lower(command), "rule.*security-group"), "security_group_rule",       \
  like(object, "/v2/security-group%") OR match(lower(command), "security-group"), "security_group",                          \
  like(object, "/v2/instance%") OR match(lower(command), "instance"), "instance",                                   \
  like(object, "/v2/sks-cluster%") OR match(lower(command), "sks-cluster"), "sks_cluster",                \
  like(object, "/v2/sks-nodepool%") OR match(lower(command), "sks-nodepool"), "sks_nodepool",        \
  like(object, "/v2/api-key%") OR match(lower(command), "api-key"), "api_key",             \
  like(object, "/v2/user%") OR match(lower(command), "user"), "user",                \
  like(object, "/v2/ssh-key%") OR match(lower(command), "ssh-key"), "ssh_key",             \
  match(object, "^https?://sos-[^/]+\\.exo\\.io/") OR match(object, "^https?://[^/]+\\.sos-[^.]+\\.exo\\.io/"), "bucket",    \
  true(), "exoscale_resource")

# object_id strategy (ids, names, bucket URL patterns)
#EVAL-object_id = coalesce('path-params.id', 'path-params.name', object_id)

#EVAL-object_id = if((isnull(object_id) OR object_id="") AND match(lower(command),"^create-"), coalesce('body-params.name', 'body-params.email', object_id), object_id)

# Bucket pattern A: https://sos-<zone>.exo.io/<bucket>
#EVAL-object_id = if((isnull(object_id) OR object_id="") AND match(object, "^https?://sos-[^/]+\\.exo\\.io/"), replace(object, "^https?://sos-[^/]+\\.exo\\.io/([^/?#]+).*$", "\\1"), object_id)

# Bucket pattern B: https://<bucket>.sos-<zone>.exo.io/
#EVAL-object_id = if((isnull(object_id) OR object_id="") AND match(object, "^https?://[^/]+\\.sos-[^.]+\\.exo\\.io/"), replace(object, "^https?://([^.]+)\\..*$", "\\1"), object_id)

# Final fallback
#EVAL-object_id = if(isnull(object_id) OR object_id="", replace(object, "^.*/", ""), object_id)

# Final multi-eval
EVAL-object_id = coalesce('path-params.id', 'path-params.name', case(match(object, "^https?:\/\/[^\.]+\.sos-[^\.]+\.exo\.io\/"), replace(object, "^https?:\/\/([^\.]+)\..*$", "\1"), match(object, "^https?:\/\/sos-[^\/]+\.exo\.io\/"), replace(object, "^https?:\/\/sos-[^\/]+\.exo\.io\/([^\/?#]+).*$", "\1"), match(lower(command),"^create-"), coalesce('body-params.name', 'body-params.email'), true(), replace(object, "^.*/", "")))

# Keep body params as a single blob (avoid field explosion)
EVAL-change_details = if(isnotnull('body-params'), tostring('body-params'), null())

# SG rule fingerprint (works even if delete-rule doesn’t include a rule id)
EVAL-is_sg_rule = if(object_category="security_group_rule", 1, 0)
EVAL-rule_protocol   = if(is_sg_rule=1, lower('body-params.protocol'), null())
EVAL-rule_direction  = if(is_sg_rule=1, lower('body-params.flow-direction'), null())
EVAL-rule_start_port = if(is_sg_rule=1, tostring('body-params.start-port'), null())
EVAL-rule_end_port   = if(is_sg_rule=1, tostring('body-params.end-port'), null())
EVAL-rule_network    = if(is_sg_rule=1, lower('body-params.network'), null())

# child_object_id mapping if rule-id is present
EVAL-child_object_id = case(object_category="security_group_rule" AND isnotnull('path-params.rule-id'), 'path-params.rule-id',     \
  object_category="security_group_rule",       \
  "sg_rule:" . coalesce('path-params.id',"") . ":" .  lower('body-params.flow-direction') . ":" . lower('body-params.protocol') . ":" . tostring('body-params.start-port') . "-" . tostring('body-params.end-port') . ":" . lower('body-params.network'),  true(), child_object_id)

# IAM API Key Masking
# EVAL-iam_api_key_key_redacted = if(isnotnull('iam-api-key.key'), "REDACTED", null())
