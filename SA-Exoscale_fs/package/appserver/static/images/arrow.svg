<svg width="200" height="120" viewBox="0 0 200 120"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="shimmer">
      <stop offset="0%" stop-color="#6ad6d7"/>
      <stop offset="50%" stop-color="#62b3b2"/>
      <stop offset="100%" stop-color="#6ad6d7"/>
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="1 0"
        dur="1.2s"
        repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <!-- Arrow shape -->
  <path d="M20 60 L120 60 L120 30 L180 60 L120 90 L120 60 L20 60 Z"
        fill="url(#shimmer)" />
  <animate attributeName="opacity"
         values="1;0.6;1"
         dur="1.5s"
         repeatCount="indefinite"/>
</svg>
